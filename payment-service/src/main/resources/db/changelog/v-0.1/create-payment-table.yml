databaseChangeLog:
  - changeSet:
      id: create-payments-table-final-v2
      author: Adil
      preConditions:
        - onFail: MARK_RAN
          not:
            - tableExists:
                tableName: payments
                schemaName: public
      changes:
        - createTable:
            tableName: payments
            schemaName: public
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: cart_items
                  type: JSONB