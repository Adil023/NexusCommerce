server:
  port: 8084

spring:
  application:
    name: cart-service
  data:
    redis:
      host: localhost
      port: 6379

  messages:
    basename: i18n/error/messages

feign:
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

internal:
  traffic:
    secret: ${INTERNAL_TRAFFIC_SECRET:demo-secure-key-2026}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans